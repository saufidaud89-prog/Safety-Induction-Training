<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial; margin: 20px; }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #f4f4f4;
        }
    </style>
</head>

<body>

<h2>Safety Induction Dashboard</h2>

<table id="table">
<tr>
<th>Name</th>
<th>IC</th>
<th>Company</th>
<th>Status</th>
<th>Cert No</th>
<th>Date</th>
</tr>
</table>

<script>

fetch("YOUR_GOOGLE_SCRIPT_URL?all=true")
.then(res => res.json())
.then(data => {

    let table = document.getElementById("table");

    data.forEach(row => {

        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.name}</td>
            <td>${row.ic}</td>
            <td>${row.company}</td>
            <td>${row.result}</td>
            <td>${row.certNo}</td>
            <td>${row.date}</td>
        `;

        table.appendChild(tr);
    });
});

</script>

</body>
</html>
